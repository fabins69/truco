<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truco Online Campeonato</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --bg1: #06141d;
      --bg2: #0c3142;
      --panel: rgba(255,255,255,0.08);
      --panel2: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.82);
      --accent: #ff9800;
      --accent2: #ffb74d;
      --danger: #e53935;
      --secondary: #546e7a;
      --success: #6cff8a;
      --warning: #ffd166;
      --shadow: 0 10px 28px rgba(0,0,0,.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: var(--text);
      text-align: center;
      min-height: 100vh;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin-bottom: 18px;
      letter-spacing: .4px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input, select {
      padding: 12px;
      border: none;
      border-radius: 12px;
      min-width: 160px;
      font-size: 16px;
      background: #fff;
      color: #111;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    button:hover { opacity: 0.94; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .secondary { background: var(--secondary); }
    .danger { background: var(--danger); }

    .box {
      max-width: 980px;
      margin: 20px auto;
      background: var(--panel);
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }

    ul { list-style: none; padding: 0; margin: 16px 0; }
    li {
      background: var(--panel2);
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .info { margin-top: 12px; font-size: 16px; }
    .success { color: var(--success); font-weight: bold; }
    .warning { color: var(--warning); }
    .error { color: #ff8a8a; font-weight: bold; }
    #debug { white-space: pre-wrap; font-size: 14px; opacity: 0.9; }

    .mesa-area { margin-top: 16px; }
    .placar {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      line-height: 1.7;
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding: 10px;
    }

    .mesa-cartas, .mao-cartas, .linha-botoes, .resumo-rodadas, .linha-acoes {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .carta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .carta-nome {
      font-size: 14px;
      opacity: 0.92;
    }

    .carta {
      width: 92px;
      height: 132px;
      background: white;
      color: black;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      transition: transform 0.15s, outline 0.15s;
      user-select: none;
    }

    .carta:hover { transform: translateY(-6px); }
    .carta.usada { opacity: 0.45; cursor: not-allowed; }
    .carta.selecionada {
      outline: 4px solid var(--accent2);
      transform: translateY(-8px);
    }

    .carta.encoberta {
      background: linear-gradient(135deg, #1d3557, #0d1b2a);
      color: #d0e6ff;
      border: 2px solid rgba(255,255,255,0.12);
    }

    .subtitulo { opacity: 0.95; margin-top: 8px; }
    .vira-box {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .badge {
      min-width: 38px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-weight: bold;
    }

    .timer {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: var(--warning);
    }

    .fim {
      font-size: 22px;
      font-weight: bold;
      color: var(--success);
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🃏 Truco Online Campeonato</h1>

    <div class="topbar">
      <input id="nome" placeholder="Seu nome">
      <input id="sala" placeholder="Código da sala">
      <select id="modo">
        <option value="1x1">1x1</option>
        <option value="2x2">2x2</option>
      </select>
      <button id="btnEntrar" type="button">Entrar</button>
    </div>

    <div id="erro" class="info error"></div>

    <div id="espera" class="box" style="display:none">
      <h2>👥 Sala de espera</h2>
      <div class="info" id="modoSala"></div>
      <ul id="lista"></ul>
      <button id="btnPronto" type="button">Estou pronto ✅</button>
      <p class="info" id="status">Aguardando jogadores...</p>
    </div>

    <div id="jogo" class="box" style="display:none">
      <div class="placar" id="placar">Placar</div>
      <div class="subtitulo" id="turnoInfo">Turno:</div>
      <div class="subtitulo" id="rodadaInfo">Rodada: 1</div>
      <div class="subtitulo" id="trucoInfo">Mão valendo: 1</div>
      <div class="timer" id="timerInfo">Tempo: --</div>

      <div class="vira-box">
        <div>🪄 Vira/Tombo:</div>
        <div class="carta usada" id="viraCarta">?</div>
        <div id="manilhaInfo">Manilha: -</div>
      </div>

      <div class="mesa-area">
        <h3>📍 Resultado das rodadas da mão</h3>
        <div class="resumo-rodadas" id="resumoRodadas"></div>
      </div>

      <div class="mesa-area">
        <h3>🪑 Mesa</h3>
        <div class="mesa-cartas" id="mesaCartas"></div>
      </div>

      <div class="mesa-area">
        <h3>🖐️ Suas cartas</h3>
        <div class="mao-cartas" id="maoCartas"></div>
      </div>

      <div class="mesa-area linha-acoes">
        <button id="btnJogarSelecionada" type="button" class="secondary">Jogar carta selecionada</button>
        <button id="btnEncobrir" type="button" class="secondary">Encobrir</button>
      </div>

      <div class="mesa-area linha-botoes">
        <button id="btnTruco" type="button">Pedir Truco</button>
        <button id="btnAceitar" type="button" class="secondary">Aceitar</button>
        <button id="btnCorrer" type="button" class="danger">Correr</button>
      </div>

      <p class="info" id="statusJogo">A partida começou.</p>
      <div id="fimPartida" class="fim" style="display:none"></div>
    </div>

    <div id="debug" class="box" style="display:none"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD4YnuGHnyAKtQERG1ojY8Nie00dMDoOAc",
      authDomain: "truco-online-eaab3.firebaseapp.com",
      projectId: "truco-online-eaab3",
      storageBucket: "truco-online-eaab3.firebasestorage.app",
      messagingSenderId: "549011297387",
      appId: "1:549011297387:web:e6490bc55684742e3dcd2e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const BARALHO = [
      "4♠","5♠","6♠","7♠","Q♠","J♠","K♠","A♠","2♠","3♠",
      "4♥","5♥","6♥","7♥","Q♥","J♥","K♥","A♥","2♥","3♥",
      "4♦","5♦","6♦","7♦","Q♦","J♦","K♦","A♦","2♦","3♦",
      "4♣","5♣","6♣","7♣","Q♣","J♣","K♣","A♣","2♣","3♣"
    ];
    const ORDEM = ["4","5","6","7","Q","J","K","A","2","3"];
    const ORDEM_NAIPES = { "♣": 1, "♥": 2, "♠": 3, "♦": 4 };
    const TEMPO_JOGADA = 20;

    let salaId = "";
    let nome = "";
    let salaListener = null;
    let cartaSelecionada = null;

    let jogadorId = sessionStorage.getItem("truco_jogador_id");
    if (!jogadorId) {
      jogadorId = Math.random().toString(36).substring(2, 10);
      sessionStorage.setItem("truco_jogador_id", jogadorId);
    }

    function mostrarErro(msg) {
      document.getElementById("erro").textContent = msg || "";
      if (msg) console.error(msg);
    }

    function debug(msg) {
      const box = document.getElementById("debug");
      box.style.display = "block";
      box.textContent = String(msg);
      console.log(msg);
    }

    function embaralhar(lista) {
      const a = [...lista];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function idsOrdenados(players) {
      return Object.keys(players || {}).sort();
    }

    function valorFace(carta) { return carta.slice(0, -1); }
    function naipeCarta(carta) { return carta.slice(-1); }

    function definirManilha(vira) {
      const face = valorFace(vira);
      const idx = ORDEM.indexOf(face);
      return ORDEM[(idx + 1) % ORDEM.length];
    }

    function forcaCarta(carta, manilha) {
      if (carta === "🂠") return -1;
      const face = valorFace(carta);
      const naipe = naipeCarta(carta);
      if (face === manilha) return 100 + (ORDEM_NAIPES[naipe] || 0);
      return ORDEM.indexOf(face);
    }

    function timeDoJogador(players, id) {
      const ids = idsOrdenados(players);
      const idx = ids.indexOf(id);
      return idx % 2 === 0 ? "A" : "B";
    }

    function proximoValorTruco(atual) {
      if (atual === 1) return 3;
      if (atual === 3) return 6;
      if (atual === 6) return 9;
      if (atual === 9) return 12;
      return 12;
    }

    function podePedirAumento(data) {
      const ultimoValor = data.trucoValor || 1;
      const ultimoAceitou = data.trucoAceitoPor || "";
      const ultimoPediu = data.trucoPedidoPorUltimo || "";
      if (ultimoValor === 1) return true;
      if (!ultimoAceitou) return false;
      return jogadorId === ultimoAceitou && jogadorId !== ultimoPediu;
    }

    function nomeDoTime(players, time) {
      const ids = idsOrdenados(players);
      const nomes = ids
        .filter((id, idx) => (idx % 2 === 0 ? "A" : "B") === time)
        .map(id => players[id]?.nome || "Jogador");
      return nomes.join(" / ") || `Time ${time}`;
    }

    function placarComNomes(players, pontos) {
      return `${nomeDoTime(players, "A")}: ${pontos?.A || 0} × ${pontos?.B || 0} :${nomeDoTime(players, "B")}`;
    }

    function decidirVencedorDaMao(rodadas, maoInicialTime = "A") {
      if (!rodadas || rodadas.length === 0) return null;
      const r1 = rodadas[0];
      const r2 = rodadas[1];
      const r3 = rodadas[2];

      if (rodadas.length === 1) return null;

      if (r1 === "E") {
        if (rodadas.length === 2) return r2 && r2 !== "E" ? r2 : null;
        if (r2 === "E" && r3 === "E") return maoInicialTime;
        if (r2 === "E") return r3 && r3 !== "E" ? r3 : maoInicialTime;
        return r2;
      }

      if (r2 === "E") return r1;
      if (r1 === r2) return r1;
      if (rodadas.length < 3) return null;
      if (r3 === "E") return r1;
      return r3 || null;
    }

    function tempoRestante(data) {
      if (!data.turnStartedAt) return TEMPO_JOGADA;
      const inicio = data.turnStartedAt.toMillis ? data.turnStartedAt.toMillis() : data.turnStartedAt;
      const agora = Date.now();
      const passou = Math.floor((agora - inicio) / 1000);
      return Math.max(0, TEMPO_JOGADA - passou);
    }

    function fimDePartida(data) {
      return (data.pontos?.A || 0) >= 12 || (data.pontos?.B || 0) >= 12;
    }

    async function entrar() {
      try {
        mostrarErro("");
        nome = document.getElementById("nome").value.trim();
        salaId = document.getElementById("sala").value.trim();
        const modoSelecionado = document.getElementById("modo").value;

        if (!nome || !salaId) {
          mostrarErro("Preencha nome e código da sala.");
          return;
        }

        const ref = db.collection("salas").doc(salaId);
        const snap = await ref.get();

        if (!snap.exists) {
          await ref.set({
            players: {},
            prontos: {},
            gameStarted: false,
            modo: modoSelecionado,
            limiteJogadores: modoSelecionado === "1x1" ? 2 : 4,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
            hands: {},
            mesa: [],
            ultimaMesa: [],
            turno: 0,
            pontos: { A: 0, B: 0 },
            trucoValor: 1,
            trucoPedidoPorUltimo: "",
            trucoAceitoPor: "",
            rodada: 1,
            rodadas: [],
            rodadaAtualVitorias: { A: 0, B: 0 },
            vira: "",
            manilha: "",
            trucoPendente: false,
            trucoPedidoPor: "",
            trucoProposto: null,
            maoInicialTime: "A",
            ultimoVencedor: "",
            turnStartedAt: null,
            partidaEncerrada: false,
            vencedorFinal: ""
          });
        }

        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          if (!data.players) data.players = {};
          if (!data.prontos) data.prontos = {};
          if (!data.hands) data.hands = {};
          if (!data.mesa) data.mesa = [];
          if (!data.ultimaMesa) data.ultimaMesa = [];
          if (!data.modo) data.modo = modoSelecionado;
          if (!data.limiteJogadores) data.limiteJogadores = data.modo === "1x1" ? 2 : 4;
          if (!data.pontos) data.pontos = { A: 0, B: 0 };
          if (data.turno === undefined) data.turno = 0;
          if (!data.rodadaAtualVitorias) data.rodadaAtualVitorias = { A: 0, B: 0 };
          if (!data.rodadas) data.rodadas = [];
          if (!data.trucoValor) data.trucoValor = 1;
          if (!data.trucoPedidoPorUltimo) data.trucoPedidoPorUltimo = "";
          if (!data.trucoAceitoPor) data.trucoAceitoPor = "";
          if (!data.rodada) data.rodada = 1;
          if (!data.vira) data.vira = "";
          if (!data.manilha) data.manilha = "";
          if (data.trucoPendente === undefined) data.trucoPendente = false;
          if (!data.trucoPedidoPor) data.trucoPedidoPor = "";
          if (data.trucoProposto === undefined) data.trucoProposto = null;
          if (!data.maoInicialTime) data.maoInicialTime = "A";
          if (!data.ultimoVencedor) data.ultimoVencedor = "";
          if (data.partidaEncerrada === undefined) data.partidaEncerrada = false;
          if (!data.vencedorFinal) data.vencedorFinal = "";

          const totalJogadores = Object.keys(data.players).length;
          const jaEstaNaSala = !!data.players[jogadorId];
          if (!jaEstaNaSala && totalJogadores >= data.limiteJogadores) throw new Error("Sala cheia para esse modo.");

          data.players[jogadorId] = { nome };
          if (data.prontos[jogadorId] === undefined) data.prontos[jogadorId] = false;
          t.set(ref, data);
        });

        document.getElementById("espera").style.display = "block";
        ouvirSala();
        debug(`Entrou na sala ${salaId} como ${nome} (${jogadorId})`);
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível entrar.");
      }
    }

    async function ficarPronto() {
      try {
        if (!salaId) {
          mostrarErro("Entre em uma sala primeiro.");
          return;
        }
        const ref = db.collection("salas").doc(salaId);
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          if (!data.prontos) data.prontos = {};
          data.prontos[jogadorId] = true;
          t.update(ref, { prontos: data.prontos });
        });
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível marcar pronto.");
      }
    }

    async function iniciarPartidaSeNecessario(data) {
      const ref = db.collection("salas").doc(salaId);
      const limite = data.limiteJogadores || 2;
      const total = Object.keys(data.players || {}).length;
      const totalProntos = Object.values(data.prontos || {}).filter(Boolean).length;
      if (total === limite && totalProntos === limite && !data.gameStarted) {
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const d = doc.data() || {};
          if (d.gameStarted) return;
          const jogadores = idsOrdenados(d.players || {});
          const deck = embaralhar(BARALHO);
          const hands = {};
          for (let i = 0; i < jogadores.length; i++) hands[jogadores[i]] = deck.splice(0, 3);
          const vira = deck.pop();
          const manilha = definirManilha(vira);
          t.update(ref, {
            gameStarted: true,
            hands,
            mesa: [],
            ultimaMesa: [],
            turno: 0,
            pontos: d.pontos || { A: 0, B: 0 },
            trucoValor: 1,
            trucoPedidoPorUltimo: "",
            trucoAceitoPor: "",
            rodada: 1,
            rodadas: [],
            rodadaAtualVitorias: { A: 0, B: 0 },
            ultimoVencedor: "",
            vira,
            manilha,
            trucoPendente: false,
            trucoPedidoPor: "",
            trucoProposto: null,
            maoInicialTime: "A",
            turnStartedAt: firebase.firestore.FieldValue.serverTimestamp(),
            partidaEncerrada: false,
            vencedorFinal: ""
          });
        });
      }
    }

    function prepararNovaMao(data, vencedorTime = null) {
      const players = data.players || {};
      const ids = idsOrdenados(players);
      const novoDeck = embaralhar(BARALHO);
      const novasHands = {};
      for (let i = 0; i < ids.length; i++) novasHands[ids[i]] = novoDeck.splice(0, 3);
      const vira = novoDeck.pop();
      const manilha = definirManilha(vira);
      data.hands = novasHands;
      data.mesa = [];
      data.ultimaMesa = [];
      data.turno = 0;
      data.trucoValor = 1;
      data.trucoPedidoPorUltimo = "";
      data.trucoAceitoPor = "";
      data.rodada = 1;
      data.rodadas = [];
      data.rodadaAtualVitorias = { A: 0, B: 0 };
      data.vira = vira;
      data.manilha = manilha;
      data.trucoPendente = false;
      data.trucoPedidoPor = "";
      data.trucoProposto = null;
      data.maoInicialTime = vencedorTime || data.maoInicialTime || "A";
      data.turnStartedAt = Date.now();
      if (vencedorTime) data.ultimoVencedor = `${nomeDoTime(players, vencedorTime)} venceu a mão`;
      if ((data.pontos?.A || 0) >= 12 || (data.pontos?.B || 0) >= 12) {
        data.partidaEncerrada = true;
        const vencedorFinal = (data.pontos?.A || 0) >= 12 ? "A" : "B";
        data.vencedorFinal = nomeDoTime(players, vencedorFinal);
      }
    }

    async function jogarCartaInterna(carta, encoberta = false) {
      try {
        const ref = db.collection("salas").doc(salaId);
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          const players = data.players || {};
          const ids = idsOrdenados(players);

          if (!data.gameStarted) throw new Error("A partida ainda não começou.");
          if (data.partidaEncerrada) throw new Error("A partida já acabou.");
          if (data.trucoPendente) throw new Error("Responda ao truco antes de jogar.");
          if (ids[data.turno] !== jogadorId) throw new Error("Não é sua vez.");
          if (!data.hands || !data.hands[jogadorId]) throw new Error("Suas cartas não foram encontradas.");
          if (!data.hands[jogadorId].includes(carta)) throw new Error("Carta inválida.");

          data.hands[jogadorId] = data.hands[jogadorId].filter(c => c !== carta);
          data.mesa = data.mesa || [];
          data.mesa.push({ jogador: jogadorId, carta: encoberta ? "🂠" : carta, real: carta, encoberta: !!encoberta });
          data.turno = (data.turno + 1) % ids.length;
          data.turnStartedAt = Date.now();

          const cartasNecessarias = data.modo === "1x1" ? 2 : 4;
          if (data.mesa.length >= cartasNecessarias) {
            let maior = forcaCarta(data.mesa[0].real || data.mesa[0].carta, data.manilha);
            let vencedores = [data.mesa[0]];
            for (let i = 1; i < data.mesa.length; i++) {
              const cartaComparada = data.mesa[i].real || data.mesa[i].carta;
              const atual = forcaCarta(cartaComparada, data.manilha);
              if (atual > maior) {
                maior = atual;
                vencedores = [data.mesa[i]];
              } else if (atual === maior) {
                vencedores.push(data.mesa[i]);
              }
            }

            const empate = vencedores.length > 1;
            if (!data.rodadas) data.rodadas = [];

            if (empate) {
              data.rodadas.push("E");
              data.ultimoVencedor = "Rodada empatou (canga)";
            } else {
              const vencedor = vencedores[0];
              const time = timeDoJogador(players, vencedor.jogador);
              data.rodadas.push(time);
              data.ultimoVencedor = `${players[vencedor.jogador]?.nome || 'Jogador'} venceu a rodada`;
              data.turno = ids.indexOf(vencedor.jogador);
              data.turnStartedAt = Date.now();
            }

            data.ultimaMesa = [...data.mesa];
            data.mesa = [];
            data.rodada = (data.rodada || 1) + 1;

            const vencedorMao = decidirVencedorDaMao(data.rodadas, data.maoInicialTime || "A");
            if (vencedorMao) {
              if (!data.pontos) data.pontos = { A: 0, B: 0 };
              data.pontos[vencedorMao] = Math.min(12, (data.pontos[vencedorMao] || 0) + (data.trucoValor || 1));
              data.ultimoVencedor = `${nomeDoTime(players, vencedorMao)} ganhou a mão`;
              prepararNovaMao(data, vencedorMao);
            }
          }

          t.set(ref, data);
        });
        cartaSelecionada = null;
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível jogar a carta.");
      }
    }

    async function jogarCartaSelecionada() {
      if (!cartaSelecionada) {
        mostrarErro("Selecione uma carta primeiro.");
        return;
      }
      await jogarCartaInterna(cartaSelecionada, false);
    }

    async function encobrirCartaSelecionada() {
      if (!cartaSelecionada) {
        mostrarErro("Selecione uma carta primeiro.");
        return;
      }
      await jogarCartaInterna(cartaSelecionada, true);
    }

    async function pedirTruco() {
      try {
        const ref = db.collection("salas").doc(salaId);
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          const players = data.players || {};
          const ids = idsOrdenados(players);
          if (!data.gameStarted) throw new Error("A partida ainda não começou.");
          if (data.partidaEncerrada) throw new Error("A partida já acabou.");
          if (data.trucoPendente) throw new Error("Já existe um truco pendente.");
          if (ids[data.turno] !== jogadorId) throw new Error("Só quem está na vez pode pedir.");
          if ((data.trucoValor || 1) >= 12) throw new Error("A mão já está valendo 12.");
          if (!podePedirAumento(data)) throw new Error("Agora só quem aceitou a última aposta pode aumentar.");

          const proximo = proximoValorTruco(data.trucoValor || 1);
          data.trucoPendente = true;
          data.trucoPedidoPor = jogadorId;
          data.trucoProposto = proximo;
          data.ultimoVencedor = `${players[jogadorId]?.nome || 'Jogador'} pediu ${proximo === 3 ? 'TRUCO' : proximo}`;
          t.set(ref, data);
        });
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível pedir truco.");
      }
    }

    async function aceitarTruco() {
      try {
        const ref = db.collection("salas").doc(salaId);
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          const players = data.players || {};
          const ids = idsOrdenados(players);
          if (!data.trucoPendente) throw new Error("Não há truco pendente.");
          if (data.trucoPedidoPor === jogadorId) throw new Error("Quem pediu não pode aceitar.");
          if (timeDoJogador(players, data.trucoPedidoPor) === timeDoJogador(players, jogadorId)) throw new Error("Só o adversário pode aceitar o truco.");
          if (ids[data.turno] === jogadorId) {
            // permitido, mas não obrigatório estar na vez
          }

          data.trucoValor = data.trucoProposto || data.trucoValor || 1;
          data.trucoAceitoPor = jogadorId;
          data.trucoPedidoPorUltimo = data.trucoPedidoPor || "";
          data.trucoPendente = false;
          data.trucoPedidoPor = "";
          data.trucoProposto = null;
          data.ultimoVencedor = `${players[jogadorId]?.nome || 'Jogador'} aceitou. A mão agora vale ${data.trucoValor}.`;
          t.set(ref, data);
        });
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível aceitar.");
      }
    }

    async function correrTruco() {
      try {
        const ref = db.collection("salas").doc(salaId);
        await db.runTransaction(async (t) => {
          const doc = await t.get(ref);
          const data = doc.data() || {};
          const players = data.players || {};
          if (!data.trucoPendente) throw new Error("Não há truco pendente.");
          if (data.trucoPedidoPor === jogadorId) throw new Error("Quem pediu não pode correr.");
          if (timeDoJogador(players, data.trucoPedidoPor) === timeDoJogador(players, jogadorId)) throw new Error("Só o adversário pode correr.");

          const timePediu = timeDoJogador(players, data.trucoPedidoPor);
          if (!data.pontos) data.pontos = { A: 0, B: 0 };
          data.pontos[timePediu] = Math.min(12, (data.pontos[timePediu] || 0) + (data.trucoValor || 1));
          data.ultimoVencedor = `${players[jogadorId]?.nome || 'Jogador'} correu. ${nomeDoTime(players, timePediu)} ganhou a mão e pontuou.`;
          prepararNovaMao(data, timePediu);
          t.set(ref, data);
        });
      } catch (erro) {
        mostrarErro(erro.message || "Não foi possível correr.");
      }
    }

    function renderJogo(data) {
      const players = data.players || {};
      const ids = idsOrdenados(players);
      const meuTime = timeDoJogador(players, jogadorId);
      const mao = (data.hands && data.hands[jogadorId]) || [];
      const mesa = (data.mesa && data.mesa.length > 0) ? data.mesa : (data.ultimaMesa || []);
      const nomeTurno = players[ids[data.turno]]?.nome || "-";
      const minhaVez = ids[data.turno] === jogadorId;
      const pedidoPorOutro = data.trucoPendente && data.trucoPedidoPor !== jogadorId;
      const podeResponder = pedidoPorOutro && timeDoJogador(players, data.trucoPedidoPor) !== timeDoJogador(players, jogadorId);
      const encerrada = fimDePartida(data) || data.partidaEncerrada;

      document.getElementById("placar").textContent = placarComNomes(players, data.pontos);
      document.getElementById("turnoInfo").textContent = minhaVez
        ? `É sua vez • Seu time: ${meuTime}`
        : `Vez de ${nomeTurno} • Seu time: ${meuTime}`;
      document.getElementById("rodadaInfo").textContent = `Rodada: ${data.rodada || 1}`;
      document.getElementById("trucoInfo").textContent = `Mão valendo: ${data.trucoValor || 1}`;
      document.getElementById("statusJogo").textContent = data.ultimoVencedor || "Jogo em andamento";
      document.getElementById("viraCarta").textContent = data.vira || "?";
      document.getElementById("manilhaInfo").textContent = `Manilha: ${data.manilha || '-'}`;
      document.getElementById("timerInfo").textContent = `Tempo: ${tempoRestante(data)}s`;

      const fimEl = document.getElementById("fimPartida");
      if (encerrada) {
        fimEl.style.display = "block";
        fimEl.textContent = `🏆 Partida encerrada — vencedor: ${data.vencedorFinal || ((data.pontos?.A || 0) >= 12 ? nomeDoTime(players, 'A') : nomeDoTime(players, 'B'))}`;
      } else {
        fimEl.style.display = "none";
        fimEl.textContent = "";
      }

      const resumo = document.getElementById("resumoRodadas");
      resumo.innerHTML = "";
      (data.rodadas || []).forEach((r, idx) => {
        const badge = document.createElement("div");
        badge.className = "badge";
        badge.textContent = r === "E" ? `R${idx + 1}: E` : `R${idx + 1}: ${r}`;
        resumo.appendChild(badge);
      });
      if ((data.rodadas || []).length === 0) resumo.innerHTML = "<p>Nenhuma rodada concluída ainda.</p>";

      const mesaDiv = document.getElementById("mesaCartas");
      mesaDiv.innerHTML = "";
      if (mesa.length === 0) {
        mesaDiv.innerHTML = "<p>Nenhuma carta na mesa.</p>";
      } else {
        mesa.forEach(item => {
          const wrap = document.createElement("div");
          wrap.className = "carta-wrap";
          const nomeJogador = document.createElement("div");
          nomeJogador.className = "carta-nome";
          nomeJogador.textContent = players[item.jogador]?.nome || "Jogador";
          const carta = document.createElement("div");
          carta.className = item.encoberta ? "carta usada encoberta" : "carta usada";
          carta.textContent = item.carta;
          wrap.appendChild(nomeJogador);
          wrap.appendChild(carta);
          mesaDiv.appendChild(wrap);
        });
      }

      const maoDiv = document.getElementById("maoCartas");
      maoDiv.innerHTML = "";
      mao.forEach(c => {
        const carta = document.createElement("div");
        carta.className = "carta" + (cartaSelecionada === c ? " selecionada" : "");
        carta.textContent = c;
        if (data.trucoPendente || !minhaVez || encerrada) {
          carta.classList.add("usada");
        } else {
          carta.addEventListener("click", () => {
            cartaSelecionada = (cartaSelecionada === c) ? null : c;
            renderJogo(data);
          });
        }
        maoDiv.appendChild(carta);
      });

      document.getElementById("btnAceitar").style.display = podeResponder ? "inline-block" : "none";
      document.getElementById("btnCorrer").style.display = podeResponder ? "inline-block" : "none";

      const btnTruco = document.getElementById("btnTruco");
      const podeAumentar = podePedirAumento(data);
      let nomeBotao = "Pedir Truco";
      if ((data.trucoValor || 1) === 3) nomeBotao = "Pedir 6";
      if ((data.trucoValor || 1) === 6) nomeBotao = "Pedir 9";
      if ((data.trucoValor || 1) === 9) nomeBotao = "Pedir 12";
      if ((data.trucoValor || 1) >= 12) nomeBotao = "Máximo 12";
      btnTruco.textContent = nomeBotao;
      btnTruco.disabled = !!data.trucoPendente || (data.trucoValor || 1) >= 12 || !minhaVez || !podeAumentar || encerrada;

      document.getElementById("btnJogarSelecionada").disabled = !cartaSelecionada || !minhaVez || !!data.trucoPendente || encerrada;
      document.getElementById("btnEncobrir").disabled = !cartaSelecionada || !minhaVez || !!data.trucoPendente || encerrada;
      document.getElementById("btnAceitar").disabled = !podeResponder || encerrada;
      document.getElementById("btnCorrer").disabled = !podeResponder || encerrada;
    }

    function ouvirSala() {
      if (salaListener) salaListener();
      const ref = db.collection("salas").doc(salaId);

      salaListener = ref.onSnapshot(async (doc) => {
        try {
          const data = doc.data();
          if (!data) return;

          const lista = document.getElementById("lista");
          const status = document.getElementById("status");
          const modoSala = document.getElementById("modoSala");
          lista.innerHTML = "";

          const players = data.players || {};
          const prontos = data.prontos || {};
          const entries = Object.entries(players);
          const total = entries.length;
          const limite = data.limiteJogadores || 2;

          entries.forEach(([id, jogador]) => {
            const li = document.createElement("li");
            const pronto = prontos[id] ? "✅" : "❌";
            li.textContent = `${jogador.nome} ${pronto}`;
            lista.appendChild(li);
          });

          modoSala.textContent = `Modo da sala: ${data.modo || "1x1"} • Jogadores: ${total}/${limite}`;
          const totalProntos = Object.values(prontos).filter(Boolean).length;

          if (!data.gameStarted) {
            if (total < limite) {
              status.textContent = `Aguardando ${limite - total} jogador(es)...`;
              status.className = "info warning";
            } else if (totalProntos < limite) {
              status.textContent = `${totalProntos}/${limite} jogadores prontos`;
              status.className = "info warning";
            } else {
              status.textContent = "Todos prontos. Iniciando partida...";
              status.className = "info success";
            }
            await iniciarPartidaSeNecessario(data);
          }

          if (data.gameStarted) {
            document.getElementById("espera").style.display = "none";
            document.getElementById("jogo").style.display = "block";
            renderJogo(data);
          }
        } catch (erro) {
          mostrarErro(erro.message || "Erro ao atualizar sala.");
        }
      }, (erro) => {
        mostrarErro(erro.message || "Erro ao ouvir a sala.");
      });
    }

    document.getElementById("btnEntrar").addEventListener("click", entrar);
    document.getElementById("btnPronto").addEventListener("click", ficarPronto);
    document.getElementById("btnTruco").addEventListener("click", pedirTruco);
    document.getElementById("btnAceitar").addEventListener("click", aceitarTruco);
    document.getElementById("btnCorrer").addEventListener("click", correrTruco);
    document.getElementById("btnJogarSelecionada").addEventListener("click", jogarCartaSelecionada);
    document.getElementById("btnEncobrir").addEventListener("click", encobrirCartaSelecionada);
  </script>
</body>
</html>
