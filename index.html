<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truco Online</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{background:#0f2027;color:white;text-align:center;font-family:sans-serif}
button{padding:10px;border:none;border-radius:10px;background:#ff9800;color:white}
input{padding:10px;border-radius:10px;border:none;margin:5px}
</style>
</head>
<body>

<h1>🃏 Truco Online</h1>

<input id="nome" placeholder="Seu nome">
<input id="sala" placeholder="Código da sala">
<select id="modo">
  <option value="1x1">1x1</option>
  <option value="2x2">2x2</option>
</select>
<button onclick="entrar()">Entrar</button>

<div id="espera" style="display:none">
<h2>👥 Jogadores</h2>
<ul id="lista"></ul>
<button onclick="ficarPronto()">Estou pronto ✅</button>
<p id="status"></p>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD4YnuGHnyAKtQERG1ojY8Nie00dMDoOAc",
  authDomain: "truco-online-eaab3.firebaseapp.com",
  projectId: "truco-online-eaab3"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let salaId="";
let jogadorId=Math.random().toString(36).substring(2);
let nome="";

async function entrar(){
  nome=document.getElementById("nome").value;
  salaId=document.getElementById("sala").value;

  if(!nome || !salaId){
    alert("Preencha tudo");
    return;
  }

  document.getElementById("espera").style.display="block";

  const ref=db.collection("salas").doc(salaId);
  const doc=await ref.get();

  if(!doc.exists){
    const modo=document.getElementById("modo").value;
    await ref.set({
      players:{},
      prontos:{},
      gameStarted:false,
      modo:modo,
      limiteJogadores: modo === "1x1" ? 2 : 4
    });
  },
      prontos:{},
      gameStarted:false
    });
  }

  await db.runTransaction(async t=>{
    const snap=await t.get(ref);
    let d=snap.data();

    if(!d.players) d.players={};
    if(!d.prontos) d.prontos={};
    if(!d.modo) d.modo="1x1";
    if(!d.limiteJogadores) d.limiteJogadores = d.modo === "1x1" ? 2 : 4;

    const totalJogadores = Object.keys(d.players).length;
    if(!d.players[jogadorId] && totalJogadores >= d.limiteJogadores){
      throw new Error("Sala cheia para o modo escolhido.");
    }

    d.players[jogadorId]={nome};

    t.set(ref,d);
  });

  ouvirSala();
}

async function ficarPronto(){
  const ref=db.collection("salas").doc(salaId);

  await db.runTransaction(async t=>{
    const snap=await t.get(ref);
    let d=snap.data();

    if(!d.prontos) d.prontos={};

    d.prontos[jogadorId]=true;

    t.update(ref,{prontos:d.prontos});
  });
}

function ouvirSala(){
  const ref=db.collection("salas").doc(salaId);

  ref.onSnapshot(async doc=>{
    const d=doc.data();
    if(!d) return;

    const lista=document.getElementById("lista");
    lista.innerHTML="";

    const jogadores=Object.entries(d.players||{});
    const prontos=d.prontos||{};
    const limite=d.limiteJogadores || 2;

    jogadores.forEach(([id,j])=>{
      const li=document.createElement("li");
      const status=prontos[id]?"✅":"❌";
      li.innerText=j.nome+" "+status;
      lista.appendChild(li);
    });

    const total=jogadores.length;
    const prontosCount=Object.keys(prontos).length;

    document.getElementById("status").innerText=`Modo: ${d.modo || "1x1"} | ${prontosCount}/${total} prontos | aguardando ${limite} jogador(es)`;

    if(total===limite && prontosCount===total && !d.gameStarted){
      await ref.update({gameStarted:true});
    }

    if(d.gameStarted){
      document.getElementById("status").innerText=`JOGO INICIADO! Modo ${d.modo}`;
    }
  });
}

</script>

</body>
</html>
